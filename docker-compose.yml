services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_URL: http://localhost:8000
      DB_CONNECTION: mongodb
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: tapterminal
      FRONTEND_URL: http://localhost:4200
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_ENCRYPTION: null
      MAIL_FROM_ADDRESS: noreply@tapterminal.com
      MAIL_FROM_NAME: Tap Terminal
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      - mongodb
      - mailpit
    command: php artisan serve --host=0.0.0.0 --port=8000

  frontend:
    image: node:22
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm start -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  mongodb_data:
  backend_vendor:
  frontend_node_modules:
