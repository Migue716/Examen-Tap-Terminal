services:
  mongodb:
    image: mongo:7
    # 27018 en el host: evita conflicto con MongoDB instalado en Windows (puerto 27017)
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      default:
        aliases:
          - mongo

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: tapterminal
    depends_on:
      - mongodb

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_URL: http://localhost:8000
      DB_CONNECTION: mongodb
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: tapterminal
      FRONTEND_URL: http://localhost:4200
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_ENCRYPTION: null
      MAIL_FROM_ADDRESS: noreply@tapterminal.com
      MAIL_FROM_NAME: Tap Terminal
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      - mongodb
      - mailpit
    command: php artisan serve --host=0.0.0.0 --port=8000

  frontend:
    image: node:22
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm start -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  mongodb_data:
  backend_vendor:
  frontend_node_modules:
