<div class="page-header">
  <div>
    <h2>Perfiles</h2>
    <p class="subtitle">Roles y permisos por sección del sistema</p>
  </div>
  <div class="page-actions">
    <button mat-stroked-button (click)="export('pdf')">
      <mat-icon>picture_as_pdf</mat-icon>
      PDF
    </button>
    <button mat-stroked-button (click)="export('excel')">
      <mat-icon>table_chart</mat-icon>
      Excel
    </button>
    @if (auth.canWrite('perfiles')) {
      <a mat-flat-button color="primary" routerLink="/perfiles/nuevo">
        <mat-icon>add</mat-icon>
        Nuevo perfil
      </a>
    }
  </div>
</div>

<mat-card class="data-card">
  <table mat-table [dataSource]="profiles">
    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef>Código</th>
      <td mat-cell *matCellDef="let row"><span class="code-badge">{{ row.code }}</span></td>
    </ng-container>
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>
    <ng-container matColumnDef="created_at">
      <th mat-header-cell *matHeaderCellDef>Creado</th>
      <td mat-cell *matCellDef="let row">{{ row.created_at }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="col-actions">Acciones</th>
      <td mat-cell *matCellDef="let row" class="col-actions">
        <button mat-icon-button (click)="detail(row.id)" matTooltip="Ver detalle" aria-label="Ver">
          <mat-icon>visibility</mat-icon>
        </button>
        @if (auth.canWrite('perfiles')) {
          <button mat-icon-button (click)="edit(row.id)" matTooltip="Editar" aria-label="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="remove(row.id)" matTooltip="Eliminar" aria-label="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        }
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell empty-hint" [attr.colspan]="displayedColumns.length">
        No hay perfiles registrados.
      </td>
    </tr>
  </table>
</mat-card>
