<mat-card class="form-card">
  <mat-card-title>{{ id ? 'Editar perfil' : 'Nuevo perfil' }}</mat-card-title>
  <mat-card-subtitle>Define nombre y secciones permitidas</mat-card-subtitle>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="form-field-full">
        <mat-label>Nombre del perfil</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="form-field-full">
        <mat-label>Secciones</mat-label>
        <mat-select formControlName="section_ids" multiple>
          @for (s of sections; track s.id) {
            <mat-option [value]="s.id">{{ s.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
      <div class="form-actions">
        <button mat-flat-button color="primary" type="submit">Guardar</button>
        <a mat-stroked-button routerLink="/perfiles">Cancelar</a>
      </div>
    </form>
  </mat-card-content>
</mat-card>
