<div class="header">
  <h2>Consulta de usuarios</h2>
  <div class="actions">
    <button mat-stroked-button (click)="export('pdf')">PDF</button>
    <button mat-stroked-button (click)="export('excel')">Excel</button>
    @if (auth.canWrite('usuarios')) {
      <a mat-flat-button color="primary" routerLink="/usuarios/nuevo">Alta</a>
    }
  </div>
</div>

<table mat-table [dataSource]="users" class="mat-elevation-z1 full">
  <ng-container matColumnDef="code"><th mat-header-cell *matHeaderCellDef>Código</th><td mat-cell *matCellDef="let row">{{ row.code }}</td></ng-container>
  <ng-container matColumnDef="username"><th mat-header-cell *matHeaderCellDef>Usuario</th><td mat-cell *matCellDef="let row">{{ row.username }}</td></ng-container>
  <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Nombre</th><td mat-cell *matCellDef="let row">{{ row.name }}</td></ng-container>
  <ng-container matColumnDef="created_at"><th mat-header-cell *matHeaderCellDef>Fecha creación</th><td mat-cell *matCellDef="let row">{{ row.created_at }}</td></ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Acciones</th>
    <td mat-cell *matCellDef="let row">
      <button mat-icon-button (click)="detail(row.id)"><mat-icon>visibility</mat-icon></button>
      @if (auth.canWrite('usuarios')) {
        <button mat-icon-button (click)="edit(row.id)"><mat-icon>edit</mat-icon></button>
        <button mat-icon-button color="warn" (click)="remove(row.id)"><mat-icon>delete</mat-icon></button>
      }
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
<style>.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.actions{display:flex;gap:8px}.full{width:100%}</style>
