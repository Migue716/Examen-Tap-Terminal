<div class="auth-wrap">
  <mat-card>
    <mat-card-title>Recuperar contraseña</mat-card-title>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full">
          <mat-label>Correo registrado</mat-label>
          <input matInput formControlName="username" type="email" />
        </mat-form-field>
        @if (message) {
          <p class="ok">{{ message }}</p>
        }
        @if (error) {
          <p class="error">{{ error }}</p>
        }
        <button mat-flat-button color="primary" class="full">Enviar credenciales</button>
      </form>
    </mat-card-content>
    <mat-card-actions>
      <a routerLink="/login">Volver al login</a>
    </mat-card-actions>
  </mat-card>
</div>
