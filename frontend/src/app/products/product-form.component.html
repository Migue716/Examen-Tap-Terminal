<mat-card>
  <mat-card-title>{{ id ? 'Editar producto' : 'Alta de producto' }}</mat-card-title>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="full">
        <mat-label>Marca</mat-label>
        <input matInput formControlName="brand" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="full">
        <mat-label>Precio (máx. 999)</mat-label>
        <input matInput type="number" formControlName="price" />
      </mat-form-field>
      <button mat-flat-button color="primary">Guardar</button>
      <a mat-button routerLink="/productos">Cancelar</a>
    </form>
  </mat-card-content>
</mat-card>
<style>.full { width: 100%; display: block; margin-bottom: 8px; }</style>
