<mat-card class="form-card">
  <mat-card-title>{{ id ? 'Editar producto' : 'Nuevo producto' }}</mat-card-title>
  <mat-card-subtitle>Completa los datos del catálogo</mat-card-subtitle>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="form-field-full">
        <mat-label>Nombre</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="form-field-full">
        <mat-label>Marca</mat-label>
        <input matInput formControlName="brand" />
      </mat-form-field>
      <mat-form-field appearance="outline" class="form-field-full">
        <mat-label>Precio (máx. 999)</mat-label>
        <input matInput type="number" formControlName="price" />
        <span matTextPrefix>$&nbsp;</span>
      </mat-form-field>
      <div class="form-actions">
        <button mat-flat-button color="primary" type="submit">Guardar</button>
        <a mat-stroked-button routerLink="/productos">Cancelar</a>
      </div>
    </form>
  </mat-card-content>
</mat-card>
